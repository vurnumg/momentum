name: Monthly Momentum Rebalance

on:
  schedule:
    - cron: "0 9 7 * *"
      timezone: "Europe/London"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-monthly-rebalance:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monthly momentum rebalance
        run: python monthly_momentum_rebalance.py

      - name: Commit updated portfolio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add portfolio.csv monthly_email.html
          git diff --cached --quiet || git commit -m "Update monthly momentum portfolio"
          git push

      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Monthly Momentum Rebalance"
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_FROM }}
          body: "Your email client does not support HTML."
          html_body: file://monthly_email.html